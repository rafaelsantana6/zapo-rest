name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Re-publish an existing tag (e.g. after adding Docker Hub secrets)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.1.0)'
        required: true
        type: string

# Packages write is required for GHCR; contents write for GitHub Releases.
permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: ver
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.ver.outputs.tag }}/CHANGELOG.md) for details.

            ## Docker images

            **Docker Hub** (recommended):

            ```bash
            docker pull ${{ github.repository_owner }}/zapo-rest:${{ steps.ver.outputs.version }}
            docker pull ${{ github.repository_owner }}/zapo-rest:latest
            ```

            **GHCR**:

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ```

  container:
    name: Publish container
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.github-release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (Hub)
        id: meta_hub
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository_owner }}/zapo-rest
          tags: |
            type=semver,pattern={{version}},value=${{ needs.github-release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.github-release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.github-release.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.github-release.outputs.tag, '-') }}

      - name: Docker meta (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.github-release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.github-release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.github-release.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.github-release.outputs.tag, '-') }}

      # Primary: Docker Hub must succeed for the release job to pass.
      - name: Build and push Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_hub.outputs.tags }}
          labels: ${{ steps.meta_hub.outputs.labels }}
          # Avoid attestation packages (often trips GHCR/Hub permission edges)
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Secondary: GHCR best-effort. Primary publish is Docker Hub (required above).
      - name: Build and push GHCR
        continue-on-error: true
        id: ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GHCR status
        if: steps.ghcr.outcome == 'failure'
        run: |
          echo "::warning::GHCR push failed (package ACL / token scope). Docker Hub image is still published."
