# Publish docs-site (product guide SPA) + static Scalar OpenAPI to GitHub Pages.
# Site:
#   Guide:  https://rafaelsantana6.github.io/zapo-rest/
#   Scalar: https://rafaelsantana6.github.io/zapo-rest/docs/
#
# First-time: repo Settings → Pages → Source = GitHub Actions
# (or run this workflow once after merge — GitHub creates the environment).

name: Docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'openapi.json'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build guide + Scalar
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install docs-site deps
        working-directory: docs-site
        run: pnpm install --frozen-lockfile

      - name: Build guide SPA (GitHub Pages base)
        working-directory: docs-site
        env:
          # Project Pages URL path: https://<user>.github.io/<repo>/
          DOCS_BASE: /zapo-rest/
        run: pnpm build

      - name: Stage static Scalar OpenAPI
        run: |
          # Source lives in docs-site/scalar/ (not under a path named "docs" —
          # root .gitignore has `docs` for the markdown folder).
          test -f docs-site/scalar/index.html
          test -f openapi.json
          mkdir -p docs-site/dist/docs
          cp docs-site/scalar/index.html docs-site/dist/docs/index.html
          cp openapi.json docs-site/dist/docs/openapi.json
          # URL parity with API `/docs/json` (raw JSON, same bytes)
          cp openapi.json docs-site/dist/docs/json

      - name: SPA fallback for client routes
        run: cp docs-site/dist/index.html docs-site/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
