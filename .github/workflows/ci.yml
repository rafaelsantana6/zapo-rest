name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: format · lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Coverage (informational)
        run: pnpm test:coverage
        continue-on-error: true

      - name: Upload coverage lcov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  build:
    name: build API + dashboard + docs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install dashboard deps
        run: pnpm --dir dashboard install --frozen-lockfile

      - name: Install docs-site deps
        run: |
          if [ -f docs-site/pnpm-lock.yaml ]; then
            pnpm --dir docs-site install --frozen-lockfile
          else
            npm --prefix docs-site ci || npm --prefix docs-site install
          fi

      - name: Build all
        run: pnpm build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zapo-rest:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
